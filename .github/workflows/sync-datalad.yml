name: Sync DataLad mirror

on:
  workflow_dispatch:
  schedule:
    - cron: '0/15 * * * *'
  workflow_run:
    workflows: ["Prepare queue", "Process AIND Queue"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,submitter
          token: ${{ secrets._GITHUB_API_KEY }}

  SyncDataLadMirror:
    needs: CheckEngaging
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Sync DataLad mirror
    runs-on: [self-hosted, mit, engaging, submitter]

    steps:
      - name: Configure Git
        run: |
          git config --global datalad.credential.api.github.com.token "${GITHUB_TOKEN}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Save DataLad dataset (in case became dirty somehow)
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: datalad -C ./datalad/dandisets/001697 save --message "saving pre-state"

      - name: Update DataLad dataset
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: backups2datalad --config ./datalad/config.yaml update-from-backup 001697

      - name: Fix annexed text files
        working-directory: /orcd/data/dandi/001/dandi-compute/datalad/dandisets/001697
        run: bash /orcd/data/dandi/001/dandi-compute/submitter/fix_annex.sh

      - name: Push to GitHub
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: datalad -C ./datalad/dandisets/001697 push --to github

  NotifyOnFailure:
    if: ${{ always() && failure() }}  # 'always' for if any 'needs' are cancelled/skipped
    needs: [CheckEngaging, SyncDataLadMirror]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check 24-hour cooldown
        id: cooldown
        uses: ./.github/actions/check-cooldown
        with:
          workflow_file: sync_datalad.yml
          token: ${{ github.token }}

      - name: Send email notification on failure
        if: ${{ steps.cooldown.outputs.should_notify == 'true' }}
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DANDI Compute: DANDI <-> GitHub Sync of 001697 failed"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: Typhon CRON
          body: |
            The scheduled run of DANDI <-> DataLad GitHub Sync of 001697 encountered an issue!
            Please check status at: https://github.com/dandi-compute/submitter/actions/workflows/sync_datalad.yml
