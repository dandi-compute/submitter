name: Archive job

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      path:
        description: "Path to job capsule."
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}
  DANDI_DEVEL: ${{ secrets.DANDI_DEVEL }}

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,submitter
          token: ${{ secrets._GITHUB_API_KEY }}

  ArchiveJob:
    needs: CheckEngaging
    name: Archive job
    runs-on: [self-hosted, mit, engaging, submitter]

    steps:
      - name: Ensure DANDI CLI is kept up-to-date
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: pip install -U dandi

      - name: Archive AIND job
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: dandicompute archive job --path ${{ inputs.path }} --processing ./tmp/

  NotifyOnFailure:
    if: ${{ always() && failure() }}
    needs: [CheckEngaging, ArchiveJob]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check 24-hour cooldown
        id: cooldown
        uses: ./.github/actions/check-cooldown
        with:
          workflow_file: prepare-aind.yml
          token: ${{ github.token }}

      - name: Send email notification on failure
        if: ${{ steps.cooldown.outputs.should_notify == 'true' }}
        uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c # v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DANDI Compute: AIND job archiving failed (MIT Engaging dispatch)"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Compute <dandi-compute@users.noreply.github.com>
          body: |
            The manual dispatch of AIND job archive encountered an issue!
            Please check status at: https://github.com/dandi-compute/submitter/actions/workflows/archive-job.yml
