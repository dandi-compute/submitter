name: Update queue state

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Prepare queue", "Process AIND queue", "Prepare AIND job", "Prepare AIND test job"]
    types: [completed]
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}
  DANDICOMPUTE_OOP_FAILSAFE_LOG: ${{ vars.DANDICOMPUTE_OOP_FAILSAFE_LOG }}

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,submitter
          token: ${{ secrets._GITHUB_API_KEY }}

  UpdateQueueState:
    needs: CheckEngaging
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Update queue state
    runs-on: [self-hosted, mit, engaging, submitter]

    steps:
      - name: Update queue state
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: |
          git -C ./queue fetch origin
          git -C ./queue reset --hard origin/main
          git -C ./queue clean -fd

          dandicompute queue refresh --queue ./queue/

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git -C queue add .
          git -C queue commit --message "update" || true  # || true in case of no changes
          git -C queue push

      - name: Re-write crontab
        run:
          ssh login007
          crontab /orcd/data/dandi/001/dandi-compute/submitter/launcher/crontab

  NotifyOnFailure:
    if: ${{ always() && failure() }}  # 'always' for if any 'needs' are cancelled/skipped
    needs: [CheckEngaging, UpdateQueueState]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check 24-hour cooldown
        id: cooldown
        uses: ./.github/actions/check-cooldown
        with:
          workflow_file: update_state.yml
          token: ${{ github.token }}

      - name: Send email notification on failure
        if: ${{ steps.cooldown.outputs.should_notify == 'true' }}
        uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c # v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DANDI Compute: AIND Queue state update failed (MIT Engaging dispatch)"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Compute <dandi-compute@users.noreply.github.com>
          body: |
            The scheduled run of AIND Queue state update encountered an issue!
            Please check status at: https://github.com/dandi-compute/submitter/actions/workflows/update_state.yml
