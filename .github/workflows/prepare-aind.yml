name: Prepare AIND job

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      test:
        description: "Prepare test queue entries."
        required: false
        type: boolean
        default: false
      id:
        description: "Content ID to process (required unless dandiset and dandipath are provided)."
        required: false
        default: ""
      dandiset:
        description: "Dandiset ID (required unless id is provided)."
        required: false
        default: ""
      dandipath:
        description: "Local Dandiset path (required unless id is provided; ignored with test=true)."
        required: false
        default: ""
      config:
        description: "Registered configuration key."
        required: false
        default: "default"
      pipeline:
        description: "Local path to pipeline repository."
        required: false
        default: "./aind-ephys-pipeline.cody"
      version:
        description: "Pipeline version (required when test=false)."
        required: false
        default: ""
      params:
        description: "Parameters key."
        required: false
        default: "default"
      submit:
        description: "Automatically submit after preparation (ignored with test=true)."
        required: false
        type: boolean
        default: false
      silent:
        description: "Suppress output messages (ignored with test=true)."
        required: false
        type: boolean
        default: false
      queue:
        description: "Queue directory path (required when test=true)."
        required: false
        default: "./queue"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,submitter
          token: ${{ secrets._GITHUB_API_KEY }}

  PrepareAIND:
    needs: CheckEngaging
    name: Prepare AIND job
    runs-on: [self-hosted, mit, engaging, compute]

    steps:
      - name: Prepare AIND job
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: |
          PREPARE_ARGS=(prepare aind)

          if [ "${{ inputs.test }}" = "true" ]; then
            PREPARE_ARGS+=(--test)
          fi

          if [ -n "${{ inputs.id }}" ]; then
            PREPARE_ARGS+=(--id "${{ inputs.id }}")
          fi

          if [ -n "${{ inputs.dandiset }}" ]; then
            PREPARE_ARGS+=(--dandiset "${{ inputs.dandiset }}")
          fi

          if [ -n "${{ inputs.dandipath }}" ]; then
            PREPARE_ARGS+=(--dandipath "${{ inputs.dandipath }}")
          fi

          if [ -n "${{ inputs.config }}" ]; then
            PREPARE_ARGS+=(--config "${{ inputs.config }}")
          fi

          if [ -n "${{ inputs.pipeline }}" ]; then
            PREPARE_ARGS+=(--pipeline "${{ inputs.pipeline }}")
          fi

          if [ -n "${{ inputs.version }}" ]; then
            PREPARE_ARGS+=(--version "${{ inputs.version }}")
          fi

          if [ -n "${{ inputs.params }}" ]; then
            PREPARE_ARGS+=(--params "${{ inputs.params }}")
          fi

          if [ "${{ inputs.submit }}" = "true" ]; then
            PREPARE_ARGS+=(--submit)
          fi

          if [ "${{ inputs.silent }}" = "true" ]; then
            PREPARE_ARGS+=(--silent)
          fi

          if [ -n "${{ inputs.queue }}" ]; then
            PREPARE_ARGS+=(--queue "${{ inputs.queue }}")
          fi

          echo "Running: dandicompute ${PREPARE_ARGS[*]}"
          dandicompute "${PREPARE_ARGS[@]}"

  NotifyOnFailure:
    if: ${{ always() && failure() }}  # 'always' for if any 'needs' are cancelled/skipped
    needs: [CheckEngaging, PrepareAIND]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check 24-hour cooldown
        id: cooldown
        uses: ./.github/actions/check-cooldown
        with:
          workflow_file: prepare-aind.yml
          token: ${{ github.token }}

      - name: Send email notification on failure
        if: ${{ steps.cooldown.outputs.should_notify == 'true' }}
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DANDI Compute: AIND job preparation failed (MIT Engaging dispatch)"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: Typhon CRON
          body: |
            The manual dispatch of AIND job preparation encountered an issue!
            Please check status at: https://github.com/dandi-compute/submitter/actions/workflows/prepare-aind.yml
