name: Prepare AIND test job

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      params:
        description: "Parameters key."
        required: false
        default: "default"
      config:
        description: "Registered configuration key."
        required: false
        default: "default"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}
  DANDICOMPUTE_OOP_FAILSAFE_LOG: ${{ vars.DANDICOMPUTE_OOP_FAILSAFE_LOG }}

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,submitter
          token: ${{ secrets._GITHUB_API_KEY }}

  PrepareAINDTest:
    needs: CheckEngaging
    name: Prepare AIND test job
    runs-on: [self-hosted, mit, engaging, submitter]

    steps:
      - name: Ensure DANDI CLI is kept up-to-date
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: pip install -U dandi

      - name: Prepare AIND test job
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: |
          PREPARE_ARGS=(prepare aind --test)
          PREPARE_ARGS+=(--pipeline "./aind-ephys-pipeline/")
          PREPARE_ARGS+=(--queue "./queue/")

          if [ -n "${{ inputs.params }}" ]; then
            PREPARE_ARGS+=(--params "${{ inputs.params }}")
          fi

          if [ -n "${{ inputs.config }}" ]; then
            PREPARE_ARGS+=(--config "${{ inputs.config }}")
          fi

          echo "Running: dandicompute ${PREPARE_ARGS[*]}"
          dandicompute "${PREPARE_ARGS[@]}"

      - name: Wait before finishing
        run: sleep 120

  NotifyOnFailure:
    if: ${{ always() && failure() }}  # 'always' for if any 'needs' are cancelled/skipped
    needs: [CheckEngaging, PrepareAINDTest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check 24-hour cooldown
        id: cooldown
        uses: ./.github/actions/check-cooldown
        with:
          workflow_file: prepare-aind-test.yml
          token: ${{ github.token }}

      - name: Send email notification on failure
        if: ${{ steps.cooldown.outputs.should_notify == 'true' }}
        uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DANDI Compute: AIND test job preparation failed (MIT Engaging dispatch)"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Compute <dandi-compute@users.noreply.github.com>
          body: |
            The manual dispatch of AIND test job preparation encountered an issue!
            Please check status at: https://github.com/dandi-compute/submitter/actions/workflows/prepare-aind-test.yml
