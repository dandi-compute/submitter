name: Update codebase

on:
  workflow_dispatch:
    inputs:
      directory:
        description: "Which cloned directory (under the cluster data root) to pull."
        required: true
        type: choice
        default: code
        options:
          - code
          - submitter
          - queue
          - aind-ephys-pipeline
      reinstall:
        description: "Run `pip install -e` on the directory after pulling (only applies to installable Python packages)."
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,submitter
          token: ${{ secrets._GITHUB_API_KEY }}

  UpdateCodebase:
    needs: CheckEngaging
    name: Update codebase
    runs-on: [self-hosted, mit, engaging, submitter]

    steps:
      - name: Pull codebase
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: |
          git -C "./${{ inputs.directory }}/" fetch origin
          git -C "./${{ inputs.directory }}/" reset --hard "@{u}"
          if [ -d "./${{ inputs.directory }}/launcher" ]; then
            find ./${{ inputs.directory }}/launcher/ -maxdepth 1 -type f ! -name "crontab" -exec chmod +x {} +
          fi

      - name: Reinstall package
        if: ${{ inputs.reinstall }}
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: |
          if [ -f "./${{ inputs.directory }}/pyproject.toml" ] || [ -f "./${{ inputs.directory }}/setup.py" ]; then
            pip install -e "./${{ inputs.directory }}/"
          else
            echo "No installable Python package found in ./${{ inputs.directory }}/; skipping reinstall."
          fi
