name: Process AIND Queue

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update queue state"]
    types: [completed]

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}
  KACHERY_API_KEY: ${{ secrets.KACHERY_API_KEY }}

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,compute
          token: ${{ secrets._GITHUB_API_KEY }}

  RunAINDEphys:
    needs: CheckEngaging
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Run AIND Ephys
    runs-on: [self-hosted, mit, engaging, compute]

    steps:
      - name: Run queue processing script
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: |
          git -C ./queue fetch origin
          git -C ./queue reset --hard origin/main
          git -C ./queue clean -fd

          git -C ./datalad/dandisets/001697 pull

          dandicompute queue process --queue ./queue --dandiset ./datalad/dandisets/001697

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git -C queue add .
          git -C queue commit --message "update" || true  # || true in case of no changes
          git -C queue push

  NotifyOnFailure:
    if: ${{ always() && failure() }}  # 'always' for if any 'needs' are cancelled/skipped
    needs: [CheckEngaging, RunAINDEphys]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check 24-hour cooldown
        id: cooldown
        uses: ./.github/actions/check-cooldown
        with:
          workflow_file: process_queue.yml
          token: ${{ github.token }}

      - name: Send email notification on failure
        if: ${{ steps.cooldown.outputs.should_notify == 'true' }}
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DANDI Compute: AIND Queue processing failed (MIT Engaging dispatch)"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: Typhon CRON
          body: |
            The scheduled run of AIND Ephys pipeline encountered an issue!
            Please check status at: https://github.com/dandi-compute/submitter/actions/workflows/process_queue.yml
