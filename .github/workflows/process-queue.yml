name: Process AIND Queue

on:
  workflow_dispatch:
    inputs:
      test:
        description: "Run in test mode (the temporary submission directory will not be deleted)."
        required: false
        default: false
        type: boolean
      max:
        description: "Maximum number of concurrent job submissions."
        required: false
        default: 2
        type: number

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}
  DANDI_DEVEL: ${{ secrets.DANDI_DEVEL }}
  KACHERY_API_KEY: ${{ secrets.KACHERY_API_KEY }}
  DANDICOMPUTE_OOP_FAILSAFE_LOG: ${{ vars.DANDICOMPUTE_OOP_FAILSAFE_LOG }}

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,submitter
          token: ${{ secrets._GITHUB_API_KEY }}

  ProcessAINDQueue:
    needs: CheckEngaging
    name: Process AIND Queue
    runs-on: [self-hosted, mit, engaging, submitter]

    steps:
      - name: Run queue processing script
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: |
          PROCESS_ARGS=(queue process --queue ./queue/ --processing ./processing/ --max "${{ inputs.max }}")

          if [ "${{ inputs.test }}" = "true" ]; then
            PROCESS_ARGS+=(--test)
          fi

          echo "Running: dandicompute ${PROCESS_ARGS[*]}"
          flock -n ./flocks/process_queue.lock dandicompute "${PROCESS_ARGS[@]}"

      - name: Wait before finishing
        run: sleep 120

  NotifyOnFailure:
    if: ${{ always() && failure() }}  # 'always' for if any 'needs' are cancelled/skipped
    needs: [CheckEngaging, ProcessAINDQueue]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check 24-hour cooldown
        id: cooldown
        uses: ./.github/actions/check-cooldown
        with:
          workflow_file: process_queue.yml
          token: ${{ github.token }}

      - name: Send email notification on failure
        if: ${{ steps.cooldown.outputs.should_notify == 'true' }}
        uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c # v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DANDI Compute: AIND Queue processing failed (MIT Engaging dispatch)"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Compute <dandi-compute@users.noreply.github.com>
          body: |
            The scheduled run of AIND Ephys pipeline encountered an issue!
            Please check status at: https://github.com/dandi-compute/submitter/actions/workflows/process_queue.yml
