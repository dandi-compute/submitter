name: Prepare queue

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum number of jobs to add to the queue."
        required: false
        default: "5"
      test:
        description: "Prepare only test assets."
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DANDI_API_KEY: ${{ vars.DANDI_API_KEY }}

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,compute
          token: ${{ secrets._GITHUB_API_KEY }}

  PrepareQueue:
    needs: CheckEngaging
    name: Prepare AIND queue
    permissions:
      contents: write
    runs-on: [self-hosted, mit, engaging, compute]

    steps:
      - name: Prepare queue
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: |
          git -C ./queue fetch origin
          git -C ./queue reset --hard origin/main
          git -C ./queue clean -fd

          git -C ./datalad/dandisets/001697 pull

          PREPARE_ARGS="--queue ./queue/ --pipeline ./aind-ephys-pipeline.cody/ --limit ${{ inputs.limit }}"

          if [ "${{ inputs.test }}" = "true" ]; then
            PREPARE_ARGS="$PREPARE_ARGS --test"
          fi

          dandicompute queue prepare $PREPARE_ARGS

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git -C queue add .
          git -C queue commit --message "update" || true  # || true in case of no changes
          git -C queue push

  NotifyOnFailure:
    if: ${{ always() && failure() }}  # 'always' for if any 'needs' are cancelled/skipped
    needs: [CheckEngaging, PrepareQueue]
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check 24-hour cooldown
        id: cooldown
        uses: ./.github/actions/check-cooldown
        with:
          workflow_file: prepare-queue.yml
          token: ${{ github.token }}

      - name: Send email notification on failure
        if: ${{ steps.cooldown.outputs.should_notify == 'true' }}
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DANDI Compute: AIND Queue preparation failed (MIT Engaging dispatch)"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: Typhon CRON
          body: |
            The manual dispatch of AIND queue preparation encountered an issue!
            Please check status at: https://github.com/dandi-compute/submitter/actions/workflows/prepare-queue.yml
