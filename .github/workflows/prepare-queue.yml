name: Prepare AIND job

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      test:
        description: "Prepare test queue entries instead of a specific AIND job."
        required: false
        type: boolean
        default: false
      id:
        description: "Content ID to process. Leave blank to prepare from a dandiset clone instead."
        required: false
        type: string
        default: ""
      dandiset:
        description: "Dandiset ID to process when `id` is not provided."
        required: false
        type: string
        default: "001697"
      dandipath:
        description: "Local dandiset path to process when `id` is not provided."
        required: false
        type: string
        default: "./datalad/dandisets/001697/"
      config:
        description: "Registered configuration key to use."
        required: false
        type: string
        default: "default"
      pipeline:
        description: "Local path to the AIND pipeline repository."
        required: false
        type: string
        default: "./aind-ephys-pipeline.cody/"
      version:
        description: "Pipeline version to use. Required unless `test` is enabled."
        required: false
        type: string
        default: ""
      params:
        description: "Registered pipeline parameter set to use."
        required: false
        type: string
        default: "default"
      submit:
        description: "Automatically submit the prepared job."
        required: false
        type: boolean
        default: false
      silent:
        description: "Suppress command output from `dandicompute prepare aind`."
        required: false
        type: boolean
        default: false
      queue:
        description: "Queue root directory containing queue_config.json (used only with `test`)."
        required: false
        type: string
        default: "./queue/"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}

jobs:
  CheckEngaging:
    name: Pre-run Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cancel if offline
        uses: ./.github/actions/check-runner
        with:
          labels: mit,engaging,compute
          token: ${{ secrets._GITHUB_API_KEY }}

  PrepareQueue:
    needs: CheckEngaging
    name: Prepare AIND job
    permissions:
      contents: write
    runs-on: [self-hosted, mit, engaging, compute]

    steps:
      - name: Prepare AIND job
        working-directory: /orcd/data/dandi/001/dandi-compute
        run: |
          git -C ./datalad/dandisets/001697 pull

          PREPARE_ARGS=(prepare aind)

          if [ "${{ inputs.test }}" = "true" ]; then
            git -C ./queue fetch origin
            git -C ./queue reset --hard origin/main
            git -C ./queue clean -fd

            PREPARE_ARGS+=(--test --queue "${{ inputs.queue }}")
          fi

          if [ -n "${{ inputs.id }}" ]; then
            PREPARE_ARGS+=(--id "${{ inputs.id }}")
          else
            PREPARE_ARGS+=(--dandiset "${{ inputs.dandiset }}" --dandipath "${{ inputs.dandipath }}")
          fi

          PREPARE_ARGS+=(--config "${{ inputs.config }}" --params "${{ inputs.params }}")

          if [ -n "${{ inputs.pipeline }}" ]; then
            PREPARE_ARGS+=(--pipeline "${{ inputs.pipeline }}")
          fi

          if [ -n "${{ inputs.version }}" ]; then
            PREPARE_ARGS+=(--version "${{ inputs.version }}")
          fi

          if [ "${{ inputs.submit }}" = "true" ]; then
            PREPARE_ARGS+=(--submit)
          fi

          if [ "${{ inputs.silent }}" = "true" ]; then
            PREPARE_ARGS+=(--silent)
          fi

          dandicompute "${PREPARE_ARGS[@]}"

          if [ "${{ inputs.test }}" = "true" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            git -C queue add .
            git -C queue commit --message "update" || true  # || true in case of no changes
            git -C queue push
          fi

  NotifyOnFailure:
    if: ${{ always() && failure() }}  # 'always' for if any 'needs' are cancelled/skipped
    needs: [CheckEngaging, PrepareQueue]
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check 24-hour cooldown
        id: cooldown
        uses: ./.github/actions/check-cooldown
        with:
          workflow_file: prepare-queue.yml
          token: ${{ github.token }}

      - name: Send email notification on failure
        if: ${{ steps.cooldown.outputs.should_notify == 'true' }}
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "DANDI Compute: AIND job preparation failed (MIT Engaging dispatch)"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: Typhon CRON
          body: |
            The manual dispatch of AIND job preparation encountered an issue!
            Please check status at: https://github.com/dandi-compute/submitter/actions/workflows/prepare-queue.yml
